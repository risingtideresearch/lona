name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # lona-geom and lona-curves resolve their workspace dependencies
      # through dist/ (package.json "main"/"types"), so the dependency
      # chain must be built before tests can import them.
      - run: npm run build

      - run: npm run test

      - run: npm run formatcheck
